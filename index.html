
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--color-background-tertiary)}
.header{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:500;text-align:center}
.tabs{display:flex;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:49px;z-index:99}
.tab{flex:1;padding:10px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:var(--color-text-secondary);transition:all .2s}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
.page{display:none;padding:12px}
.page.active{display:block}
.section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding:0 2px}
.card{background:var(--color-background-primary);border-radius:12px;border:0.5px solid var(--color-border-tertiary);margin-bottom:8px;overflow:hidden}
.exercise-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.ex-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:12px;color:var(--color-text-secondary);margin-top:1px}
.ex-check{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;border:2px solid var(--color-border-secondary);color:var(--color-text-tertiary);transition:all .2s}
.ex-check.done{background:#22c55e;border-color:#22c55e;color:#fff}
.ex-body{border-top:0.5px solid var(--color-border-tertiary);padding:12px 14px;display:none}
.ex-body.open{display:block}
.row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.label{font-size:12px;color:var(--color-text-secondary);width:80px;flex-shrink:0}
.num-input{display:flex;align-items:center;gap:6px}
.num-btn{width:30px;height:30px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--color-text-primary);font-weight:400;line-height:1;user-select:none}
.num-btn:active{background:var(--color-background-tertiary)}
.num-val{width:44px;text-align:center;font-size:16px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:4px 0;background:var(--color-background-secondary)}
.done-row{display:flex;align-items:center;gap:8px}
.done-input{width:64px;text-align:center;font-size:20px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:10px;padding:6px 0;background:var(--color-background-secondary);color:var(--color-text-primary)}
.done-status{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.status-ok{background:#dcfce7;color:#15803d}
.status-fail{background:#fee2e2;color:#b91c1c}
.status-none{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.add-btn{width:100%;padding:12px;border-radius:10px;border:1.5px dashed var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:14px;cursor:pointer;margin-top:4px}
.add-btn:active{background:var(--color-background-secondary)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px 16px 32px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:16px;text-align:center}
.ex-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ex-pick{padding:12px 10px;border-radius:10px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);cursor:pointer;text-align:center;font-size:13px;font-weight:500}
.ex-pick:active{background:var(--color-background-tertiary)}
.ex-pick .pick-icon{font-size:22px;margin-bottom:4px}
.close-btn{width:100%;padding:12px;border-radius:10px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);font-size:14px;cursor:pointer;margin-top:12px}
.progress-card{background:var(--color-background-primary);border-radius:12px;border:0.5px solid var(--color-border-tertiary);margin-bottom:8px;padding:14px}
.prog-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog-icon{font-size:20px}
.prog-name{font-size:14px;font-weight:500;flex:1}
.prog-best{font-size:12px;color:var(--color-text-secondary)}
.prog-bar-bg{height:6px;border-radius:3px;background:var(--color-background-tertiary);overflow:hidden}
.prog-bar{height:100%;border-radius:3px;background:#22c55e;transition:width .4s}
.prog-stats{display:flex;justify-content:space-between;margin-top:6px}
.prog-stat{font-size:11px;color:var(--color-text-secondary)}
.prog-stat strong{color:var(--color-text-primary);font-weight:500}
.date-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px}
.date-strip::-webkit-scrollbar{display:none}
.date-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary)}
.date-chip.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.empty-state{text-align:center;padding:40px 20px;color:var(--color-text-secondary);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px}
.summary-bar{display:flex;gap:8px;margin-bottom:12px}
.sum-card{flex:1;background:var(--color-background-primary);border-radius:10px;border:0.5px solid var(--color-border-tertiary);padding:10px;text-align:center}
.sum-num{font-size:22px;font-weight:500}
.sum-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.workout-title{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.workout-title input{flex:1;font-size:15px;font-weight:500;border:none;background:transparent;color:var(--color-text-primary);outline:none}
</style>
<div class="app">
<div class="header"><h1>Дневник тренировок</h1></div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('workout')">Тренировка</div>
  <div class="tab" onclick="switchTab('dashboard')">Прогресс</div>
</div>

<div class="page active" id="page-workout">
  <div class="date-strip" id="dateStrip"></div>
  <div class="workout-title">
    <input type="text" id="workoutTitle" placeholder="Название тренировки" maxlength="40">
  </div>
  <div id="exerciseList"></div>
  <button class="add-btn" onclick="openModal()">+ Добавить упражнение</button>
</div>

<div class="page" id="page-dashboard">
  <div class="summary-bar" id="summaryBar">
    <div class="sum-card"><div class="sum-num" id="sumTotal">0</div><div class="sum-lbl">тренировок</div></div>
    <div class="sum-card"><div class="sum-num" id="sumExTotal">0</div><div class="sum-lbl">упражнений</div></div>
    <div class="sum-card"><div class="sum-num" id="sumReps">0</div><div class="sum-lbl">повторений</div></div>
  </div>
  <div class="section-title">Прогресс по упражнениям</div>
  <div id="progressList"></div>
</div>
</div>

<div class="modal-bg" id="modal" onclick="closeModal(event)">
<div class="modal">
  <h2>Выбрать упражнение</h2>
  <div class="ex-list" id="exPickList"></div>
  <button class="close-btn" onclick="closeModalDirect()">Закрыть</button>
</div>
</div>

<script>
const EXERCISES=[
  {id:'pushup',name:'Отжимания',icon:'🤜'},
  {id:'burpee',name:'Берпи',icon:'⚡'},
  {id:'squat',name:'Приседания',icon:'🦵'},
  {id:'abs',name:'Пресс',icon:'💪'},
  {id:'kb_chin',name:'Подъём гири к подбородку',icon:'🏋️'},
  {id:'kb_swing',name:'Махи гирей вперёд',icon:'🔄'},
  {id:'kb_squat',name:'Присед с гирей',icon:'🏋️'},
  {id:'kb_press',name:'Жим гири за головой',icon:'⬆️'},
  {id:'kb_halo',name:'Вращение гири над головой',icon:'🌀'},
  {id:'kb_bend',name:'Наклоны с гирей',icon:'↙️'},
  {id:'kb_row',name:'Тяга гири одной рукой',icon:'💪'},
  {id:'kb_lunge',name:'Выпады с гирей',icon:'🚶'},
  {id:'kb_push',name:'Выталкивание гири над головой',icon:'🔝'},
  {id:'kb_orbit',name:'Вращение гири вокруг корпуса',icon:'🔃'},
];

let state={sessions:{},currentDate:todayStr(),};
function todayStr(){let d=new Date();return d.toISOString().slice(0,10);}
function load(){try{let s=localStorage.getItem('wkd2');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('wkd2',JSON.stringify(state));}catch(e){}}
function getSession(date){if(!state.sessions[date])state.sessions[date]={title:'',exercises:[]};return state.sessions[date];}

load();

function renderDates(){
  const strip=document.getElementById('dateStrip');
  strip.innerHTML='';
  const days=14;
  for(let i=days-1;i>=0;i--){
    let d=new Date();d.setDate(d.getDate()-i);
    let s=d.toISOString().slice(0,10);
    let label=i===0?'Сегодня':i===1?'Вчера':d.toLocaleDateString('ru',{day:'numeric',month:'short'});
    let chip=document.createElement('div');
    chip.className='date-chip'+(s===state.currentDate?' active':'');
    chip.textContent=label;
    chip.onclick=()=>{state.currentDate=s;save();renderAll();};
    strip.appendChild(chip);
  }
  strip.scrollLeft=strip.scrollWidth;
}

function renderWorkout(){
  const sess=getSession(state.currentDate);
  document.getElementById('workoutTitle').value=sess.title||'';
  const list=document.getElementById('exerciseList');
  list.innerHTML='';
  if(sess.exercises.length===0){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">🏋️</div>Добавьте первое упражнение</div>';
    return;
  }
  sess.exercises.forEach((ex,idx)=>{
    const exDef=EXERCISES.find(e=>e.id===ex.id)||{name:ex.id,icon:'•'};
    const target=ex.target||10;
    const done=ex.done||0;
    const checked=done>=target&&done>0;
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <div class="exercise-header" onclick="toggleEx(${idx})">
        <div class="ex-icon" style="background:var(--color-background-secondary)">${exDef.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${exDef.name}</div>
          <div class="ex-meta">${done}/${target} повт.</div>
        </div>
        <div class="ex-check${checked?' done':''}">
          ${checked?'✓':''}
        </div>
      </div>
      <div class="ex-body${ex.open?' open':''}">
        <div class="row">
          <div class="label">Цель</div>
          <div class="num-input">
            <div class="num-btn" onclick="adj(${idx},'target',-1)">−</div>
            <div class="num-val" id="tv${idx}">${target}</div>
            <div class="num-btn" onclick="adj(${idx},'target',1)">+</div>
          </div>
        </div>
        <div class="row">
          <div class="label">Выполнено</div>
          <div class="done-row">
            <div class="num-btn" onclick="adj(${idx},'done',-1)">−</div>
            <input class="done-input" type="number" min="0" id="dv${idx}" value="${done}" oninput="setDone(${idx},this.value)" inputmode="numeric">
            <div class="num-btn" onclick="adj(${idx},'done',1)">+</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="done-status ${done===0?'status-none':checked?'status-ok':'status-fail'}">${done===0?'Не начато':checked?'✓ Цель достигнута':'✗ Ниже цели'}</span>
          <span style="font-size:12px;color:var(--color-text-secondary);cursor:pointer" onclick="removeEx(${idx})">Удалить</span>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

function toggleEx(idx){
  const sess=getSession(state.currentDate);
  sess.exercises[idx].open=!sess.exercises[idx].open;
  save();renderWorkout();
}
function adj(idx,field,delta){
  const sess=getSession(state.currentDate);
  let v=(sess.exercises[idx][field]||0)+delta;
  if(v<0)v=0;
  sess.exercises[idx][field]=v;
  save();renderWorkout();
}
function setDone(idx,val){
  const sess=getSession(state.currentDate);
  sess.exercises[idx].done=parseInt(val)||0;
  save();renderWorkout();
}
function removeEx(idx){
  const sess=getSession(state.currentDate);
  sess.exercises.splice(idx,1);
  save();renderWorkout();
}

document.getElementById('workoutTitle').oninput=function(){
  getSession(state.currentDate).title=this.value;save();
};

function openModal(){document.getElementById('modal').classList.add('open');}
function closeModalDirect(){document.getElementById('modal').classList.remove('open');}
function closeModal(e){if(e.target===document.getElementById('modal'))closeModalDirect();}

function renderModal(){
  const list=document.getElementById('exPickList');
  list.innerHTML='';
  EXERCISES.forEach(ex=>{
    const d=document.createElement('div');
    d.className='ex-pick';
    d.innerHTML=`<div class="pick-icon">${ex.icon}</div>${ex.name}`;
    d.onclick=()=>addExercise(ex.id);
    list.appendChild(d);
  });
}

function addExercise(id){
  const sess=getSession(state.currentDate);
  sess.exercises.push({id,target:10,done:0,open:true});
  save();renderWorkout();closeModalDirect();
}

function renderDashboard(){
  const allDates=Object.keys(state.sessions);
  document.getElementById('sumTotal').textContent=allDates.length;
  let totalEx=0,totalReps=0;
  const exStats={};
  allDates.forEach(date=>{
    const sess=state.sessions[date];
    totalEx+=sess.exercises.length;
    sess.exercises.forEach(ex=>{
      totalReps+=(ex.done||0);
      if(!exStats[ex.id])exStats[ex.id]={name:EXERCISES.find(e=>e.id===ex.id)?.name||ex.id,icon:EXERCISES.find(e=>e.id===ex.id)?.icon||'•',sessions:[],best:0,last:0};
      exStats[ex.id].sessions.push({date,done:ex.done||0,target:ex.target||10});
      if((ex.done||0)>exStats[ex.id].best)exStats[ex.id].best=ex.done||0;
      exStats[ex.id].last=ex.done||0;
    });
  });
  document.getElementById('sumExTotal').textContent=totalEx;
  document.getElementById('sumReps').textContent=totalReps;

  const pl=document.getElementById('progressList');
  pl.innerHTML='';
  const keys=Object.keys(exStats);
  if(keys.length===0){pl.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div>Нет данных. Начните тренировку!</div>';return;}
  keys.forEach(id=>{
    const st=exStats[id];
    const sorted=st.sessions.sort((a,b)=>a.date.localeCompare(b.date));
    const last=sorted[sorted.length-1];
    const prev=sorted.length>1?sorted[sorted.length-2]:null;
    const pct=st.best>0?Math.min(100,Math.round((last.done/st.best)*100)):0;
    const trend=prev?last.done-prev.done:0;
    const trendStr=trend>0?`+${trend}`:trend<0?`${trend}`:'=';
    const trendColor=trend>0?'#22c55e':trend<0?'#ef4444':'var(--color-text-secondary)';
    const card=document.createElement('div');
    card.className='progress-card';
    card.innerHTML=`
      <div class="prog-header">
        <div class="prog-icon">${st.icon}</div>
        <div class="prog-name">${st.name}</div>
        <div class="prog-best">Рекорд: <strong>${st.best}</strong></div>
      </div>
      <div class="prog-bar-bg"><div class="prog-bar" style="width:${pct}%"></div></div>
      <div class="prog-stats">
        <div class="prog-stat">Последний раз: <strong>${last.done}</strong></div>
        <div class="prog-stat">Сессий: <strong>${sorted.length}</strong></div>
        <div class="prog-stat">Динамика: <strong style="color:${trendColor}">${trendStr}</strong></div>
      </div>`;
    pl.appendChild(card);
  });
}

function renderAll(){
  renderDates();
  renderWorkout();
  renderModal();
  renderDashboard();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='dashboard')renderDashboard();
}

renderAll();
</script>
